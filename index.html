<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Equilibrium #3429 - NFT Preview Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="card">
    <div class="card__images">
      <img class="card__images-img" src="assets/image-equilibrium.jpg" alt="Equilibrium #3429 artwork" />
      <div class="card__images-layer">
        <img src="assets/icon-view.svg" alt="" aria-hidden="true" />
      </div>
    </div>

    <div class="card__title">
      <h1>Equilibrium #3429</h1>
    </div>

    <p class="card__info">Our Equilibrium collection promotes balance and calm.</p>

    <div class="card__time">
      <div class="card__time-left">
        <img src="assets/icon-ethereum.svg" alt="" aria-hidden="true" />
        <span>0.041 ETH</span>
      </div>
      <div class="card__time-right">
        <img src="assets/icon-clock.svg" alt="" aria-hidden="true" />
        <span>3 days left</span>
      </div>
    </div>

    <hr class="card__divider" />

    <div class="card__creator">
      <img class="card__creator-img" src="assets/logo.jpeg" alt="Ketan Makode" />
      <p class="card__creator-text">Creation of <span class="card__creator-name">Ketan Makode</span></p>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.crio.do" target="_blank" rel="noopener noreferrer">Crio.Do</a>. Coded by <a href="https://www.github.com" target="_blank" rel="noopener noreferrer">Ketan Makode</a>.
  </footer>

</body>
</html>
